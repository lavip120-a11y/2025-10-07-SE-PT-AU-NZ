<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Template</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e3f2fd;
      }
      .card {
        padding: 10px;
      }
      .card-title {
        font-weight: 600;
        font-size: 3em;
        padding: 0 0 10px 0;
      }
      .card-description {
        font-weight: 400;
        font-size: 2em;
      }
    </style>
  </head>
<script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script> <!--from iconify-->
  <body>
    <template id="card-template"> <!--template to replicate a single card-->
      <div class="card">
          
        <div class="card-body">
        <iconify-icon icon="game-icons:dinosaur-bones" width="50" height="50"  style="color: #3d9020"></iconify-icon> 
          <div class="card-title"></div>
          <div class="card-text"></div>
        </div>
      </div>
      
    </template>
        <div id="card-list"></div> <!--must append this or it wont show on the screen-->

    <script> //add just before the closing body tag 
      function addCard() {

        // clone the template
        const template = document.getElementById("card-template") // structure of template is stored in template variable
          .content.cloneNode(true); //creates a clone of the code of the template structure above

        // populate the template
        template.querySelector(".card-title").innerText = "My Card Title"; //selector checks to see if there is any 
        // template using .card-title and accesses that div above.  inner text - text between open and closed tag of the div
        template.querySelector(".card-text").innerText = "lorem ipsum ble bla";

        // include the populated template into the page
        document
          .querySelector("#card-list") //# is a class selector
          .appendChild(template); //appends to a copy of the child - the addCard()
      }

      addCard(); //call the card, function cannot call itself
      addCard()
      addCard() // repeats on the page
    </script>
  </body>
</html>
