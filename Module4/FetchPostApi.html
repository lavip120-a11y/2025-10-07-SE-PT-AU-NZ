<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Placeholder Posts</title>
  </head>
  <body>
    <h1>Check the console</h1>
  </body>
  <script>
    fetch("https://jsonplaceholder.typicode.com/posts", {
      method: "POST", // GET is default, but we can also use POST //the structure for method and headers remain the same
      body: JSON.stringify({ //body that you will pass will be a JSON string object
        // POSTed data goes in the request body
        title: "The Studio",
        body: "Something funny",
        userId: 1,
      }),
      headers: { //headers of your request
        "Content-type": "application/json; charset=UTF-8", //the type of content you are posting
      },
    })
      .then((response) => response.json()) //handling like a promise
      .then((json) => console.log(json));
  </script>
</html>
